apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus.erp-monitoring.svc.cluster.local:9090
    isDefault: true
    editable: false
    uid: prometheus
    jsonData:
      timeInterval: "15s"
      queryTimeout: "30s"
      httpMethod: "POST"

  - name: Loki
    type: loki
    access: proxy
    url: http://loki.erp-monitoring.svc.cluster.local:3100
    isDefault: false
    editable: false
    uid: loki
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: trace_id
          matcherRegex: "trace_id=(\\w+)"
          url: "http://jaeger.erp-monitoring.svc.cluster.local:16686/trace/$${__value.raw}"

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger.erp-monitoring.svc.cluster.local:16686
    isDefault: false
    editable: false
    uid: jaeger
