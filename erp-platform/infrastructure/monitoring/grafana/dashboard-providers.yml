apiVersion: 1

providers:
  - name: "ERP Dashboards"
    orgId: 1
    folder: "ERP Platform"
    folderUid: "erp-platform"
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
