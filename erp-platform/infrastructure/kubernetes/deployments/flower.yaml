apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower
  namespace: erp-system
  labels:
    app.kubernetes.io/name: erp-platform
    app.kubernetes.io/component: flower
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: erp-platform
      app.kubernetes.io/component: flower
  template:
    metadata:
      labels:
        app.kubernetes.io/name: erp-platform
        app.kubernetes.io/component: flower
    spec:
      containers:
        - name: flower
          image: mher/flower:2.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5555
              name: http
              protocol: TCP
          args:
            - --broker=amqp://erp_user:$(RABBITMQ_PASSWORD)@rabbitmq.erp-storage.svc.cluster.local:5672//
            - --broker_api=http://erp_user:$(RABBITMQ_PASSWORD)@rabbitmq.erp-storage.svc.cluster.local:15672/api/
            - --basic_auth=$(FLOWER_USER):$(FLOWER_PASSWORD)
            - --url_prefix=flower
          env:
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: rabbitmq_password
            - name: FLOWER_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: flower_user
            - name: FLOWER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: flower_password
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /flower/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /flower/
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
