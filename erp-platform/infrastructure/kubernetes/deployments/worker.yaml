apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: erp-system
  labels:
    app.kubernetes.io/name: erp-platform
    app.kubernetes.io/component: worker
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: erp-platform
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: erp-platform
        app.kubernetes.io/component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: worker
          image: ghcr.io/erp-platform/worker:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.core.queue.celery_app
            - worker
            - --loglevel=info
            - --concurrency=8
            - --max-tasks-per-child=100
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - app.core.queue.celery_app
                - inspect
                - ping
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - celery
                - -A
                - app.core.queue.celery_app
                - inspect
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 12
      terminationGracePeriodSeconds: 120
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - worker
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
