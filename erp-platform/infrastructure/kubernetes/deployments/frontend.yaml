apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: erp-system
  labels:
    app.kubernetes.io/name: erp-platform
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: erp-platform
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: erp-platform
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/erp-platform/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: VITE_API_URL
              value: "https://erp-platform.com/api/v1"
            - name: VITE_WEBSOCKET_URL
              value: "wss://erp-platform.com/ws"
            - name: VITE_APP_NAME
              value: "ERP Platform"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
