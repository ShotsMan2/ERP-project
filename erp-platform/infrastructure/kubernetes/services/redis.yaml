apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: erp-storage
  labels:
    app.kubernetes.io/name: erp-platform
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/name: erp-platform
    app.kubernetes.io/component: redis
