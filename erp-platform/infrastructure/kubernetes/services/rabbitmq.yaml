apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: erp-storage
  labels:
    app.kubernetes.io/name: erp-platform
    app.kubernetes.io/component: rabbitmq
spec:
  type: ClusterIP
  ports:
    - port: 5672
      targetPort: 5672
      protocol: TCP
      name: amqp
    - port: 15672
      targetPort: 15672
      protocol: TCP
      name: management
  selector:
    app.kubernetes.io/name: erp-platform
    app.kubernetes.io/component: rabbitmq
