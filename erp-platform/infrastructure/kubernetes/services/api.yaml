apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: erp-system
  labels:
    app.kubernetes.io/name: erp-platform
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: erp-platform
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: api-metrics
  namespace: erp-system
  labels:
    app.kubernetes.io/name: erp-platform
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: erp-platform
    app.kubernetes.io/component: api
