version: "3.9"

x-backend-base: &backend-base
  build:
    context: .
    dockerfile: infrastructure/docker/backend.Dockerfile
  env_file: .env
  environment:
    - PYTHONDONTWRITEBYTECODE=1
    - PYTHONUNBUFFERED=1
  volumes:
    - ./backend:/app/backend
    - ./shared:/app/shared
  networks:
    - erp-network
  restart: unless-stopped

x-worker-base: &worker-base
  build:
    context: .
    dockerfile: infrastructure/docker/worker.Dockerfile
  env_file: .env
  environment:
    - PYTHONDONTWRITEBYTECODE=1
    - PYTHONUNBUFFERED=1
  volumes:
    - ./backend:/app/backend
    - ./shared:/app/shared
  networks:
    - erp-network
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erp_db}
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_secret_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-erp_redis_secret}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: erp-rabbitmq
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-erp_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-erp_rabbit_secret}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - erp-network

  elasticsearch:
    image: elasticsearch:8.14.0
    container_name: erp-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - erp-network

  minio:
    image: minio/minio:latest
    container_name: erp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - erp-network

  backend:
    <<: *backend-base
    container_name: erp-backend
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  celery-worker:
    <<: *worker-base
    container_name: erp-celery-worker
    command: celery -A app.core.queue.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      - postgres
      - redis
      - rabbitmq

  celery-beat:
    <<: *worker-base
    container_name: erp-celery-beat
    command: celery -A app.core.queue.celery_app beat --loglevel=info
    depends_on:
      - postgres
      - redis
      - rabbitmq

  flower:
    image: mher/flower:2.0
    container_name: erp-flower
    command: celery flower --broker=amqp://${RABBITMQ_USER:-erp_user}:${RABBITMQ_PASSWORD:-erp_rabbit_secret}@rabbitmq:5672//
    ports:
      - "5555:5555"
    depends_on:
      - rabbitmq
      - celery-worker
    networks:
      - erp-network

  frontend:
    image: node:20-alpine
    container_name: erp-frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    networks:
      - erp-network

  nginx:
    image: nginx:1.27-alpine
    container_name: erp-nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - erp-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  elasticsearch_data:
  minio_data:

networks:
  erp-network:
    driver: bridge
