image: python:3.12-slim

stages:
  - lint
  - test
  - build
  - security
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  REGISTRY: ${CI_REGISTRY}
  IMAGE_NAMESPACE: ${CI_PROJECT_NAMESPACE}
  IMAGE_TAG: ${CI_COMMIT_SHA}
  DATABASE_URL: postgresql+asyncpg://erp_user:erp_test_secret@postgres:5432/erp_db_test
  REDIS_URL: redis://redis:6379/0

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .pip-cache/
    - frontend/node_modules/

default:
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends gcc libpq-dev curl
    - pip install --upgrade pip
    - pip install uv

services:
  - name: postgres:16-alpine
    alias: postgres
    variables:
      POSTGRES_DB: erp_db_test
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_test_secret
  - name: redis:7-alpine
    alias: redis

# ===== LINT =====

ruff-lint:
  stage: lint
  script:
    - uv pip install -r backend/requirements/base.txt -r backend/requirements/dev.txt --system
    - ruff check app/ tests/
  artifacts:
    reports:
      codequality: gl-code-quality-report.json
  only:
    - merge_requests
    - main
    - develop

mypy-typecheck:
  stage: lint
  script:
    - uv pip install -r backend/requirements/base.txt -r backend/requirements/dev.txt --system
    - mypy app/ --ignore-missing-imports

eslint-frontend:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend && npm ci && npm run lint
  only:
    - merge_requests
    - main
    - develop

tsc-typecheck:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend && npm ci && npx tsc --noEmit

# ===== TEST =====

pytest-backend:
  stage: test
  script:
    - uv pip install -r backend/requirements/base.txt -r backend/requirements/dev.txt --system
    - cd backend
    - alembic upgrade head
    - pytest tests/ -v --cov=app --cov-report=xml --cov-report=term --junitxml=report.xml --timeout=60
  artifacts:
    reports:
      junit: backend/report.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml

vitest-frontend:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend && npm ci && npm run test -- --coverage --reporter=junit --outputFile=report.xml
  artifacts:
    reports:
      junit: frontend/report.xml

# ===== BUILD =====

docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $REGISTRY/$IMAGE_NAMESPACE/backend:$IMAGE_TAG -f infrastructure/docker/backend.Dockerfile .
    - docker build -t $REGISTRY/$IMAGE_NAMESPACE/worker:$IMAGE_TAG -f infrastructure/docker/worker.Dockerfile .
    - docker build -t $REGISTRY/$IMAGE_NAMESPACE/frontend:$IMAGE_TAG -f frontend/Dockerfile ./frontend
    - docker push $REGISTRY/$IMAGE_NAMESPACE/backend:$IMAGE_TAG
    - docker push $REGISTRY/$IMAGE_NAMESPACE/worker:$IMAGE_TAG
    - docker push $REGISTRY/$IMAGE_NAMESPACE/frontend:$IMAGE_TAG
  only:
    - main
    - tags

# ===== SECURITY =====

trivy-scan:
  stage: security
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - trivy image --severity CRITICAL,HIGH --exit-code 1 $REGISTRY/$IMAGE_NAMESPACE/backend:$IMAGE_TAG
    - trivy image --severity CRITICAL,HIGH --exit-code 1 $REGISTRY/$IMAGE_NAMESPACE/frontend:$IMAGE_TAG

dependency-scan:
  stage: security
  script:
    - uv pip install safety --system
    - safety check -r backend/requirements/base.txt
  allow_failure: true

# ===== DEPLOY =====

.deploy-base:
  stage: deploy
  script:
    - apk add --no-cache curl python3 py3-pip git
    - pip3 install awscli
    - aws eks update-kubeconfig --name erp-platform-${DEPLOY_ENV} --region us-east-1
    - sed -i "s|image:.*backend:.*|image: $REGISTRY/$IMAGE_NAMESPACE/backend:$IMAGE_TAG|g" infrastructure/kubernetes/deployments/api.yaml
    - sed -i "s|image:.*worker:.*|image: $REGISTRY/$IMAGE_NAMESPACE/worker:$IMAGE_TAG|g" infrastructure/kubernetes/deployments/worker.yaml
    - sed -i "s|image:.*frontend:.*|image: $REGISTRY/$IMAGE_NAMESPACE/frontend:$IMAGE_TAG|g" infrastructure/kubernetes/deployments/frontend.yaml
    - kubectl apply -f infrastructure/kubernetes/namespaces/
    - kubectl apply -f infrastructure/kubernetes/configmaps/
    - kubectl apply -f infrastructure/kubernetes/services/
    - kubectl apply -f infrastructure/kubernetes/deployments/
    - kubectl apply -f infrastructure/kubernetes/hpa/
    - kubectl apply -f infrastructure/kubernetes/ingress/
    - kubectl rollout status deployment/api -n erp-system --timeout=5m
    - kubectl rollout status deployment/worker -n erp-system --timeout=5m
    - kubectl rollout status deployment/frontend -n erp-system --timeout=5m
  environment:
    name: $DEPLOY_ENV
  only:
    - main
    - tags

deploy-staging:
  extends: .deploy-base
  variables:
    DEPLOY_ENV: staging
  only:
    - main

deploy-production:
  extends: .deploy-base
  variables:
    DEPLOY_ENV: production
  only:
    - tags
  when: manual
